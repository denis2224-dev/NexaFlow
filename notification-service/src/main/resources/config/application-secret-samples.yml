  datasource:
    username: notification-service
    password: ${NOTIFICATION_SERVICE_DB_PASSWORD:}

jhipster:
  security:
    authentication:
      jwt:
        base64-secret: ${JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET}
