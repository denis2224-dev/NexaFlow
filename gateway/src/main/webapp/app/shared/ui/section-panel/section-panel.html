<section class="nf-section-panel">
  @if (title() || description()) {
    <header class="nf-section-panel__header">
      <div>
        @if (title()) {
          <h2>{{ title() }}</h2>
        }
        @if (description()) {
          <p>{{ description() }}</p>
        }
      </div>
      <div class="nf-section-panel__actions">
        <ng-content select="[panel-actions]" />
      </div>
    </header>
  }
  <ng-content />
</section>
