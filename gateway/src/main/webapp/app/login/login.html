<section class="nf-auth">
  <div class="nf-auth__panel">
    <div class="nf-auth__brand">
      <span class="nf-auth__mark">N</span>
      <div>
        <strong>NexaFlow</strong>
        <span>Workspace operations platform</span>
      </div>
    </div>

    <header class="nf-auth__header">
      <h1 data-cy="loginTitle" jhiTranslate="login.title">Sign in</h1>
      <p>Access your workspaces, teams, and daily work.</p>
    </header>

    @if (authenticationError()) {
      <div class="nf-auth__error" data-cy="loginError" jhiTranslate="login.messages.error.authentication">
        <strong>Failed to sign in!</strong> Please check your credentials and try again.
      </div>
    }

    <form class="nf-auth__form" (ngSubmit)="login()" [formGroup]="loginForm">
      <label>
        <span jhiTranslate="global.form.username.label">Username</span>
        <input
          #username
          type="text"
          name="username"
          id="username"
          placeholder="{{ 'global.form.username.placeholder' | translate }}"
          formControlName="username"
          data-cy="username"
        />
      </label>

      <label>
        <span jhiTranslate="login.form.password">Password</span>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="{{ 'login.form.password.placeholder' | translate }}"
          formControlName="password"
          data-cy="password"
        />
      </label>

      <div class="nf-auth__row">
        <label class="nf-auth__check" for="rememberMe">
          <input type="checkbox" name="rememberMe" id="rememberMe" formControlName="rememberMe" />
          <span jhiTranslate="login.form.rememberme">Remember me</span>
        </label>
        <a routerLink="/account/reset/request" data-cy="forgetYourPasswordSelector" jhiTranslate="login.password.forgot">
          Did you forget your password?
        </a>
      </div>

      <button type="submit" class="nf-auth__submit" data-cy="submit" jhiTranslate="login.form.button">Sign in</button>
    </form>

    <footer class="nf-auth__footer">
      <span>
        <span jhiTranslate="global.messages.info.register.noaccount">You don&apos;t have an account yet?</span>
        <a routerLink="/account/register" jhiTranslate="global.messages.info.register.link">Register a new account</a>
      </span>
    </footer>
  </div>
</section>
