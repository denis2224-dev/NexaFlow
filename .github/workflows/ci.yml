name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            test-excludes: ""
          # TODO: Remove these exclusions after service exceptions no longer depend on the web layer.
          - service: user-service
            test-excludes: "**/*IT*,**/*IntTest*,**/TechnicalStructureTest.*"
          - service: project-service
            test-excludes: "**/*IT*,**/*IntTest*,**/TechnicalStructureTest.*"
          - service: billing-service
            test-excludes: ""
          - service: notification-service
            test-excludes: ""

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Run backend unit tests
        env:
          TEST_EXCLUDES: ${{ matrix.test-excludes }}
        run: |
          test_args=()
          if [[ -n "$TEST_EXCLUDES" ]]; then
            test_args+=("-Dsurefire.excludes=$TEST_EXCLUDES")
          fi
          ./mvnw -B -ntp -Pdev "${test_args[@]}" test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npx ng test --watch=false --coverage

      - name: Build production bundle
        run: npm run build:prod

  compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET: Y2ktb25seS1qd3Qtc2VjcmV0LW5vdC1mb3ItcnVudGltZS11c2UtMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      APPLICATION_INTERNAL_API_TOKEN: ci-only-internal-api-token
      GATEWAY_DB_PASSWORD: ci-only-password
      USER_SERVICE_DB_PASSWORD: ci-only-password
      PROJECT_SERVICE_DB_PASSWORD: ci-only-password
      BILLING_SERVICE_DB_PASSWORD: ci-only-password
      NOTIFICATION_SERVICE_DB_PASSWORD: ci-only-password

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose config --quiet

  docker:
    name: Docker · ${{ matrix.image }}
    needs:
      - backend
      - frontend
      - compose
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: gateway
            context: gateway
          - image: user-service
            context: user-service
          - image: project-service
            context: project-service
          - image: billing-service
            context: billing-service
          - image: notification-service
            context: notification-service
          - image: frontend
            context: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/Dockerfile
          push: false
          tags: nexaflow/${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
