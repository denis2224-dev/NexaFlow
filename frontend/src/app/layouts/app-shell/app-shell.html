<p-toast key="shell-notifications" />

<div class="nf-shell" [class.nf-shell--collapsed]="sidebarCollapsed()" [class.nf-shell--mobile-open]="mobileSidebarOpen()">
  <aside class="nf-sidebar" aria-label="Primary navigation">
    <div class="nf-sidebar__brand">
      <span class="nf-brand-mark" aria-hidden="true">N</span>
      <div class="nf-brand-copy">
        <span>NexaFlow</span>
        <small>Platform</small>
      </div>
    </div>

    <nav class="nf-sidebar__nav">
      @for (item of navItems; track item.route) {
        <a
          class="nf-nav-link"
          [routerLink]="item.route"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        >
          <fa-icon [icon]="item.icon" />
          <span>{{ item.label }}</span>
        </a>
      }

      @if (isAdmin()) {
        <a class="nf-nav-link" routerLink="/admin" routerLinkActive="is-active">
          <fa-icon icon="users-cog" />
          <span>Admin</span>
        </a>
      }
    </nav>

    <div class="nf-sidebar__footer">
      <button class="nf-sidebar-action" type="button" (click)="toggleSidebar()">
        <fa-icon icon="bars" />
        <span>{{ sidebarCollapsed() ? 'Expand' : 'Collapse' }}</span>
      </button>
      <button class="nf-sidebar-action nf-sidebar-action--danger" type="button" (click)="logout()">
        <fa-icon icon="sign-out-alt" />
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <button class="nf-mobile-backdrop" type="button" aria-label="Close navigation" (click)="toggleMobileSidebar()"></button>

  <div class="nf-shell__body">
    <header class="nf-topbar">
      <div class="nf-topbar__left">
        <button class="nf-icon-button nf-topbar__menu" type="button" aria-label="Open navigation" (click)="toggleMobileSidebar()">
          <fa-icon icon="bars" />
        </button>
        <div>
          <span class="nf-topbar__label">Workspace console</span>
          <h1>{{ pageTitle() }}</h1>
        </div>
      </div>

      <div class="nf-topbar__right">
        <jhi-notification-dropdown />
        <jhi-active-organization-selector />
        <a class="nf-user-pill" routerLink="/app/profile">
          <span class="nf-avatar" aria-hidden="true">{{ userInitial() }}</span>
          <span class="nf-user-pill__copy">
            <strong>{{ displayName() }}</strong>
            <small>{{ account()?.email || account()?.login }}</small>
          </span>
        </a>
      </div>
    </header>

    <main class="nf-shell__content">
      <router-outlet />
    </main>
  </div>
</div>
